<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH TV Pro — البث المباشر الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07070d;
            --bg-secondary: #0e0e18;
            --bg-tertiary: #161624;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[var(--bg-secondary)] p-4 shadow-md border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <i class="lucide-tv"></i> MOH TV Pro
            </h1>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-[var(--bg-tertiary)] rounded-xl p-4 border border-white/5">
                <h2 class="text-lg font-semibold mb-4 text-[var(--text-primary)]">قائمة القنوات المتاحة</h2>
                <div id="channelsList" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    </div>
            </div>

            <div class="bg-[var(--bg-secondary)] rounded-xl p-4 border border-white/5 h-fit sticky top-4">
                <h2 class="text-lg font-semibold mb-4 text-[var(--text-primary)]">مشغل البث</h2>
                <div class="aspect-video bg-black rounded-lg overflow-hidden relative">
                    <video id="videoPlayer" class="w-full h-full object-contain" controls autoplay playsinline></video>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[var(--bg-secondary)] text-center py-4 border-t border-white/5 mt-auto text-sm text-[var(--text-secondary)]">
        تم التصميم بواسطة MOH TV Pro
    </footer>

    <script>
        const STORAGE_KEY = 'mohtv_channels';
        
        // --- باقة القنوات الخاصة بك (Playlists) ---
        const defaultChannels = [
            {
                id: "ch_1",
                name: "القناة الأولى (تجريبية)",
                url: "https://test-streams.mux.dev/x3636/x3636.m3u8",
                category: "عامة",
                logo: "https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=100",
                description: "بث تجريبي للقناة الأولى"
            },
            {
                id: "ch_2",
                name: "قناة رياضية (تجريبية)",
                url: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8",
                category: "رياضة",
                logo: "https://images.unsplash.com/photo-1431327151626-96f8c7270f7a?w=100",
                description: "بث تجريبي للقنوات الرياضية"
            }
        ];

        let channels = [];
        
        function loadChannels() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    channels = JSON.parse(stored);
                } else {
                    channels = [...defaultChannels];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
                }
            } catch (e) {
                console.error("خطأ في قراءة البيانات", e);
                channels = [...defaultChannels];
            }
        }

        function renderChannels() {
            const container = document.getElementById('channelsList');
            if (!container) return;
            
            container.innerHTML = '';
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = "bg-[var(--bg-primary)] p-3 rounded-lg cursor-pointer border border-white/10 hover:border-[var(--accent-purple)] transition flex flex-col items-center text-center";
                card.onclick = () => playChannel(channel.url);
                
                card.innerHTML = `
                    <img src="${channel.logo || 'https://via.placeholder.com/100'}" alt="${channel.name}" class="w-16 h-16 object-cover rounded-lg mb-2">
                    <h3 class="font-medium text-sm text-white">${channel.name}</h3>
                    <span class="text-xs text-[var(--text-secondary)] mt-1">${channel.category}</span>
                `;
                container.appendChild(card);
            });
        }

        function playChannel(url) {
            const video = document.getElementById('videoPlayer');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play().catch(e => console.log("الرجاء الضغط على تشغيل الفيديو يدوياً", e));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log("الرجاء الضغط على تشغيل الفيديو يدوياً", e));
            }
        }

        function init() {
            loadChannels();
            renderChannels();
            // تشغيل أول قناة افتراضياً بشكل تجريبي
            if (channels.length > 0) {
                playChannel(channels[0].url);
            }
        }

        // تشغيل الكود بمجرد تحميل الصفحة بالكامل
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
